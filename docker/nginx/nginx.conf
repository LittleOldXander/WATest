# =============================================================================
# Edge cache (Layer 1) — CDN emulator
# =============================================================================
# This is a LOCAL EMULATOR of the CDN tier, not a CDN. It reproduces the
# cache semantics a real edge applies (shared cache keyed on the public URL,
# honouring the origin's Cache-Control, request collapsing, stale-on-error)
# so that behaviour can be tested in CI. It does NOT reproduce a CDN's
# defining property: many points of presence geographically near users.
# See README "Edge layer" for the full comparison.
#
# Runtime flow:
#   User -> [this] -> API replicas -> in-memory (L2) -> Redis (L3) -> MongoDB
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Cache status is in the log line so `docker compose logs edge` shows the
    # hit/miss pattern directly.
    log_format edge '$remote_addr $status "$request" '
                    'cache=$upstream_cache_status '
                    'upstream_time=$upstream_response_time request_time=$request_time';
    access_log /var/log/nginx/access.log edge;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # -------------------------------------------------------------------------
    # Shared cache zone
    # -------------------------------------------------------------------------
    # inactive=10m is deliberately much longer than the origin's s-maxage=10s.
    # An entry must OUTLIVE its freshness window to remain available as stale
    # content during an origin outage — if inactive were <= s-maxage, nginx
    # would evict the entry the moment it expired and proxy_cache_use_stale
    # would have nothing to serve.
    proxy_cache_path /var/cache/nginx/banners
                     levels=1:2
                     keys_zone=banner_edge:10m
                     max_size=100m
                     inactive=10m
                     use_temp_path=off;

    # $upstream_cache_status is empty when the cache was never consulted
    # (uncached locations). Report that as BYPASS so the header is always one
    # of the documented values.
    map $upstream_cache_status $cache_status {
        ''      BYPASS;
        default $upstream_cache_status;
    }

    # The origin cache-layer header is useful only when this request actually
    # contacted an origin. Nginx stores upstream response headers alongside a
    # cached body, so forwarding it unconditionally would make an edge HIT
    # claim a stale origin outcome such as "database" or "in-memory".
    map $upstream_cache_status $origin_served_by {
        ~^(MISS|BYPASS|EXPIRED|REVALIDATED)$ $upstream_http_x_served_by;
        default "";
    }

    # Two independent replicas, sharing Redis/MongoDB, load-balanced with
    # nginx's default round-robin. This is what makes cross-instance
    # single-flight collapsing a REAL multi-process behaviour rather than
    # something only exercised against fakes: concurrent requests for the
    # same cache key are genuinely routed to different OS processes.
    upstream banner_api {
        server api-a:3000;
        server api-b:3000;
        keepalive 32;
    }

    # Single-replica upstreams, used only by the diagnostic /__replica__/*
    # routes below. Round-robin across `banner_api` is right for real
    # traffic, but a test proving per-instance behaviour (metrics, reset)
    # needs to address one specific process.
    upstream banner_api_a {
        server api-a:3000;
    }

    upstream banner_api_b {
        server api-b:3000;
    }

    server {
        listen 80;
        server_name _;

        # ---------------------------------------------------------------------
        # Cached public endpoint
        # ---------------------------------------------------------------------
        location = /api/banners {
            proxy_pass http://banner_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Fail fast to stale content rather than hanging a user request
            # when the origin is unhealthy.
            proxy_connect_timeout 2s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;

            proxy_cache banner_edge;
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Only idempotent public reads are cacheable (this is also the
            # nginx default; stated explicitly as the contract).
            proxy_cache_methods GET HEAD;

            # -----------------------------------------------------------------
            # FRESHNESS IS OWNED BY THE ORIGIN.
            # -----------------------------------------------------------------
            # There is deliberately NO `proxy_cache_valid` for 200 here. nginx
            # derives the TTL from the origin's Cache-Control (s-maxage=10),
            # which keeps the API's header as the single contract for edge
            # behaviour. Adding proxy_cache_valid would let the edge and the
            # origin disagree about freshness.
            #
            # This is also what guarantees 503s are never cached: the error
            # path sets `Cache-Control: no-store`, and no proxy_cache_valid
            # exists for any 5xx code, so an error response has no route to
            # being stored.
            proxy_cache_revalidate on;

            # -----------------------------------------------------------------
            # Edge-level request collapsing
            # -----------------------------------------------------------------
            # One request per key populates the cache; the rest wait for it
            # instead of stampeding the origin. This is the outermost of the
            # three collapsing layers (edge -> per-instance promise memo ->
            # cross-instance Redis lease).
            proxy_cache_lock on;
            proxy_cache_lock_timeout 10s;
            proxy_cache_lock_age 10s;

            # -----------------------------------------------------------------
            # Stale serving + background refresh
            # -----------------------------------------------------------------
            # `updating`: while one request refreshes the entry, others get the
            # stale copy immediately rather than blocking.
            # `error timeout http_5xx`: if the origin is down, keep serving the
            # last good response instead of propagating the failure.
            proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;

            # -----------------------------------------------------------------
            # Public content only
            # -----------------------------------------------------------------
            # A credentialed request is never served from, or stored in, the
            # shared cache — the standard guard against leaking a personalised
            # response to another user. Both directives are required: bypass
            # controls reads, no_cache controls writes.
            proxy_cache_bypass $http_authorization;
            proxy_no_cache     $http_authorization;

            # The origin sets no cookies; refuse to cache if that ever changes.
            proxy_hide_header Set-Cookie;

            # X-Served-By describes the origin cache layer. On an edge HIT it
            # would be a cached, misleading value (for example "database").
            # Hide it from public responses; expose it only as a diagnostic
            # header on fresh edge-to-origin responses.
            proxy_hide_header X-Served-By;
            add_header X-Origin-Served-By $origin_served_by always;

            add_header X-Cache-Status $cache_status always;
            add_header X-Edge-Node "docker-nginx-emulator" always;
        }

        # ---------------------------------------------------------------------
        # Operational endpoints — proxied, never cached
        # ---------------------------------------------------------------------
        # Exposed through the edge so tests and local debugging can read origin
        # counters now that the API has no host port. A real deployment would
        # restrict /metrics to an internal network or scrape it directly from
        # the origin rather than publishing it at the edge.
        location = /healthz {
            proxy_pass http://banner_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_cache off;
            add_header X-Cache-Status $cache_status always;
        }

        location = /readyz {
            proxy_pass http://banner_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_cache off;
            add_header X-Cache-Status $cache_status always;
        }

        location = /metrics {
            proxy_pass http://banner_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_cache off;
            add_header X-Cache-Status $cache_status always;
        }

        # ---------------------------------------------------------------------
        # Per-replica diagnostics — TEST/DEV ONLY, addresses one specific
        # instance instead of round-robining across `banner_api`.
        # ---------------------------------------------------------------------
        # Real production traffic never needs to single out a replica; a
        # production edge config would not include this block. It exists so
        # the multi-replica integration test can read each instance's own
        # /metrics (to sum per-replica counters correctly) and call each
        # instance's own /__test__/reset (which itself 404s unless the
        # target process booted with ENABLE_TEST_CONTROLS=true).
        #
        # Two separate regex locations rather than one location with an
        # `if`/`set` branch on a shared `(a|b)` capture: nginx's `if` inside
        # a `location` is notoriously unreliable for anything beyond a
        # single `return`/`rewrite` (see the "if is evil" nginx pitfalls
        # page), and mixing it with numbered captures from the enclosing
        # location caused `nginx: [emerg] unknown "1" variable` on startup.
        # Each location below has its own single-capture regex, so `$1`
        # unambiguously refers to that location's own match.
        location ~ ^/__replica__/a(/.*)$ {
            proxy_pass http://banner_api_a$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_cache off;
        }

        location ~ ^/__replica__/b(/.*)$ {
            proxy_pass http://banner_api_b$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_cache off;
        }

        # Anything else: forwarded uncached, exactly as an edge forwards
        # unknown paths to origin.
        location / {
            proxy_pass http://banner_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 2s;
            proxy_cache off;
            add_header X-Cache-Status $cache_status always;
        }
    }
}
